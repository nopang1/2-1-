<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2-1 학급 코인 상점</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a7a3a; --green-dark:#0d4d24; --green-mid:#2ea855; --green-light:#4cdc78;
  --gold:#d4a017; --gold-light:#f5c842; --gold-dark:#a87800;
  --bg:#061608; --surface:#0a2614; --surface2:#12331c;
  --text:#e8f5eb; --text-muted:#8bc49a;
}

body{font-family:'Nanum Gothic',sans-serif;background:#061608;color:var(--text);min-height:100vh}

  background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCAxNjAgODAiPgogIDxyZWN0IHg9IjQiIHk9IjQiIHdpZHRoPSIxNTIiIGhlaWdodD0iNzIiIHJ4PSI2IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMS44IiBvcGFjaXR5PSIwLjE1Ii8+CiAgPHJlY3QgeD0iMTEiIHk9IjExIiB3aWR0aD0iMTM4IiBoZWlnaHQ9IjU4IiByeD0iMyIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjAuOCIgb3BhY2l0eT0iMC4wOSIvPgogIDxjaXJjbGUgY3g9IjgwIiBjeT0iNDAiIHI9IjE1IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMS40IiBvcGFjaXR5PSIwLjEzIi8+CiAgPGNpcmNsZSBjeD0iODAiIGN5PSI0MCIgcj0iOSIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjAuNyIgb3BhY2l0eT0iMC4wOCIvPgogIDxjaXJjbGUgY3g9IjI0IiBjeT0iNDAiIHI9IjEwIiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMS4yIiBvcGFjaXR5PSIwLjEyIi8+CiAgPGNpcmNsZSBjeD0iMTM2IiBjeT0iNDAiIHI9IjEwIiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMS4yIiBvcGFjaXR5PSIwLjEyIi8+CiAgPHRleHQgeD0iODAiIHk9IjQ2IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LXNpemU9IjE0IiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjE1IiBmb250LWZhbWlseT0iR2VvcmdpYSxzZXJpZiIgZm9udC13ZWlnaHQ9ImJvbGQiPiQ8L3RleHQ+CiAgPGxpbmUgeDE9IjQzIiB5MT0iMTUiIHgyPSI0MyIgeTI9IjY1IiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMC41IiBvcGFjaXR5PSIwLjA4Ii8+CiAgPGxpbmUgeDE9IjExNyIgeTE9IjE1IiB4Mj0iMTE3IiB5Mj0iNjUiIHN0cm9rZT0iI2ZmZmZmZiIgc3Ryb2tlLXdpZHRoPSIwLjUiIG9wYWNpdHk9IjAuMDgiLz4KPC9zdmc+");
  background-size:160px 80px;background-repeat:repeat;
}
header h1{font-family:'Black Han Sans',sans-serif;font-size:2.1rem;letter-spacing:3px;color:var(--gold-light);position:relative;text-shadow:0 2px 8px rgba(0,0,0,.5)}
header p{color:#a8d4b0;margin-top:6px;font-size:.9rem;position:relative}

.container{max-width:1100px;margin:30px auto;padding:0 20px 40px}

button{
  font-family:'Nanum Gothic',sans-serif;font-weight:800;font-size:.88rem;
  background:linear-gradient(135deg,var(--green),var(--green-mid));
  border:none;color:white;padding:10px 18px;border-radius:8px;
  cursor:pointer;transition:transform .1s,box-shadow .1s;box-shadow:0 3px 8px rgba(0,0,0,.4)
}
button:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(46,168,85,.4)}
button:active{transform:translateY(0)}
.btn-y{background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));color:#071a0e;box-shadow:0 3px 8px rgba(212,160,23,.35)}
.btn-y:hover{box-shadow:0 5px 14px rgba(245,200,66,.5)}

/* 로딩 화면 */
#loadingPage{position:fixed;inset:0;background:#061608;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.spinner{width:48px;height:48px;border:4px solid var(--surface2);border-top:4px solid var(--gold-light);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.login{max-width:400px;margin:80px auto;background:var(--surface);border:2px solid var(--green-mid);padding:36px;border-radius:16px;box-shadow:0 0 40px rgba(46,168,85,.2);text-align:center}
.login h2{font-family:'Black Han Sans',sans-serif;color:var(--gold-light);margin-bottom:20px;font-size:1.4rem}
.login input{display:block;width:85%;margin:0 auto 10px;background:var(--surface2);border:1px solid var(--green-mid);color:var(--text);padding:11px 16px;border-radius:8px;font-family:inherit;font-size:1rem;outline:none}
.login input:focus{border-color:var(--gold-light)}
.err{color:#ff7070;font-size:.82rem;margin-bottom:8px;min-height:18px}
.hint{font-size:.82rem;color:var(--text-muted);margin-top:14px}
.hint span{color:var(--gold-light);cursor:pointer;text-decoration:underline}

.balance-bar{display:flex;align-items:center;gap:14px;background:var(--surface);border:2px solid var(--green-mid);border-radius:12px;padding:14px 20px;margin-bottom:20px}
.balance-bar .amount{font-family:'Black Han Sans',sans-serif;font-size:1.6rem;color:var(--gold-light)}
.balance-bar .lbl{color:var(--text-muted);font-size:.9rem}
.top-actions{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}

#adminPanel{background:var(--surface);border:2px solid var(--green-mid);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
#adminPanel h3{width:100%;color:var(--green-light);font-size:.95rem}
#adminPanel label{color:var(--text-muted);font-size:.85rem}
#adminPanel input{background:var(--surface2);border:1px solid var(--green-mid);color:var(--text);padding:8px 12px;border-radius:7px;font-family:inherit;width:110px}
#resetConfirm{display:none;width:100%;background:rgba(5,20,10,.8);border:1px solid var(--green-mid);border-radius:8px;padding:12px 14px;margin-top:8px}
#resetConfirm p{color:var(--text-muted);font-size:.88rem;margin-bottom:10px}
#resetConfirm div{display:flex;gap:8px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px;margin-bottom:36px}
.card{background:var(--surface);border:2px solid var(--surface2);border-radius:14px;padding:22px 18px;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:border-color .2s,transform .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(212,160,23,.1),transparent 70%)}
.card:hover{border-color:var(--gold);transform:translateY(-4px)}
.card h3{font-family:'Nanum Gothic',sans-serif;font-weight:700;color:var(--gold-light);font-size:1rem;margin-bottom:8px}
.card .price{color:var(--text-muted);font-size:.88rem;margin-bottom:14px}
.card .price span{color:var(--green-light);font-weight:800}

.table-box{background:var(--surface);border:2px solid var(--surface2);border-radius:14px;padding:22px}
.table-box h2{font-family:'Black Han Sans',sans-serif;color:var(--gold-light);margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--surface2);text-align:center;font-size:.88rem}
th{background:var(--surface2);color:var(--gold);font-weight:800}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(46,168,85,.06)}

.overlay{position:fixed;inset:0;background:#030e05;z-index:999;overflow-y:auto;padding:32px 20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ov-header{display:flex;align-items:center;gap:16px;max-width:1100px;margin:0 auto 24px}
.ov-header h2{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:var(--gold-light)}
.log-cards{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.log-card{background:#152e1e;border:1px solid #1e4a2a;border-top:4px solid var(--green-mid);border-radius:10px 10px 0 10px;padding:18px 16px 14px;display:flex;flex-direction:column;gap:6px;animation:fadeIn .25s ease both;box-shadow:0 4px 16px rgba(0,0,0,.5);clip-path:polygon(0 0,100% 0,100% calc(100% - 22px),calc(100% - 22px) 100%,0 100%)}
.log-card.plus{border-top-color:var(--green-mid)}
.log-amt{font-family:'Black Han Sans',sans-serif;font-size:2rem;line-height:1.1}
.log-amt.plus{color:#4da6ff}
.log-amt.minus{color:#ff7070}
.log-time{font-size:.72rem;color:#5a8a65}
.log-who{font-size:.95rem;font-weight:800;color:var(--text-muted)}
.log-item{font-size:.8rem;color:#6a9a75}

.slot-overlay{
  position:fixed;inset:0;z-index:999;overflow-y:auto;padding:32px 20px;
  animation:fadeIn .2s ease;display:flex;flex-direction:column;align-items:center;
  background:radial-gradient(ellipse at 50% 0%,#6b1200 0%,#3a0800 40%,#1a0300 100%)
}
.slot-overlay::before,.slot-overlay::after{
  content:'';position:fixed;left:0;right:0;height:22px;pointer-events:none;z-index:1000;
  background-repeat:repeat-x;background-size:144px 22px;
}
.slot-overlay::before{
  top:0;
  background-image:
    radial-gradient(circle 9px at 18px 11px,#fff176 0%,#ffd600 50%,transparent 70%),
    radial-gradient(circle 9px at 54px 11px,#ff8a80 0%,#e53935 50%,transparent 70%),
    radial-gradient(circle 9px at 90px 11px,#80d8ff 0%,#039be5 50%,transparent 70%),
    radial-gradient(circle 9px at 126px 11px,#ccff90 0%,#43a047 50%,transparent 70%);
}
.slot-overlay::after{
  bottom:0;
  background-image:
    radial-gradient(circle 9px at 18px 11px,#ccff90 0%,#43a047 50%,transparent 70%),
    radial-gradient(circle 9px at 54px 11px,#fff176 0%,#ffd600 50%,transparent 70%),
    radial-gradient(circle 9px at 90px 11px,#ff8a80 0%,#e53935 50%,transparent 70%),
    radial-gradient(circle 9px at 126px 11px,#80d8ff 0%,#039be5 50%,transparent 70%);
}
.slot-ov-header{display:flex;align-items:center;gap:16px;width:100%;max-width:580px;margin-bottom:24px}
.slot-box{
  width:100%;max-width:580px;background:linear-gradient(160deg,#4a1000,#2d0700);
  border:3px solid #ffd600;border-radius:20px;padding:32px 28px;text-align:center;
  box-shadow:0 0 80px rgba(220,30,10,.5),0 0 0 1px rgba(255,214,0,.3)
}
.slot-box h2{font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:#ffd600;text-shadow:0 0 20px rgba(255,214,0,.6);margin-bottom:16px}
.odds-table{background:rgba(0,0,0,.4);border:1px solid rgba(255,180,0,.25);border-radius:10px;padding:14px 20px;margin-bottom:22px;display:flex;flex-direction:column;gap:0}
.odds-row{display:flex;align-items:center;justify-content:space-between;font-size:.84rem;color:#d4907a;padding:5px 0;border-bottom:1px solid rgba(255,150,0,.1)}
.odds-row b{color:#ffd600;font-size:.95rem;min-width:40px;text-align:right}
.odds-row:last-child{border-bottom:none}
.reels{display:flex;justify-content:center;gap:14px;margin-bottom:20px}
.reel{width:82px;height:92px;background:linear-gradient(160deg,#1a0300,#2e0800);border:2px solid #f9a825;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;box-shadow:0 4px 16px rgba(0,0,0,.6)}
.slot-result{font-size:1.15rem;font-weight:900;min-height:30px;margin-bottom:18px;color:#e09070}
.bet-row{display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.bet-row input{width:110px;padding:10px;background:#1a0300;border:1px solid #f9a825;color:white;border-radius:8px;font-size:1rem;text-align:center;outline:none}
.bet-row input:focus{border-color:#ffd600;box-shadow:0 0 0 2px rgba(255,214,0,.2)}
.btn-spin{background:linear-gradient(135deg,#b01208,#e8280b) !important;padding:11px 28px !important;font-size:1rem !important;border:1px solid #ffd600 !important;box-shadow:0 4px 16px rgba(192,22,14,.6) !important;border-radius:8px !important}

.rainbow-text{color:#ffd600;font-weight:900}
@keyframes neonPulse{0%,100%{opacity:1;text-shadow:0 0 8px currentColor,0 0 20px currentColor,0 0 40px currentColor}50%{opacity:.7;text-shadow:0 0 4px currentColor,0 0 10px currentColor}}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
@keyframes bulbBlink{0%,100%{opacity:1}45%,55%{opacity:.15}}
@keyframes floatChip{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(8deg)}}
.casino-bg{
  background:#000 !important;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(180,0,0,.35),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(120,0,180,.2),transparent),
    radial-gradient(ellipse 60% 40% at 20% 100%,rgba(0,80,180,.2),transparent) !important;
}
.casino-bg::before{
  background-image:
    radial-gradient(circle 9px at 18px 11px,#fff176 0%,#ffd600 50%,transparent 70%),
    radial-gradient(circle 9px at 54px 11px,#ff8a80 0%,#e53935 50%,transparent 70%),
    radial-gradient(circle 9px at 90px 11px,#80d8ff 0%,#039be5 50%,transparent 70%),
    radial-gradient(circle 9px at 126px 11px,#ccff90 0%,#43a047 50%,transparent 70%);
  animation:bulbBlink 1.2s infinite;
}
.casino-bg::after{
  background-image:
    radial-gradient(circle 9px at 18px 11px,#ccff90 0%,#43a047 50%,transparent 70%),
    radial-gradient(circle 9px at 54px 11px,#fff176 0%,#ffd600 50%,transparent 70%),
    radial-gradient(circle 9px at 90px 11px,#ff8a80 0%,#e53935 50%,transparent 70%),
    radial-gradient(circle 9px at 126px 11px,#80d8ff 0%,#039be5 50%,transparent 70%);
  animation:bulbBlink 1.2s .6s infinite;
}
.casino-marquee-wrap{width:100%;overflow:hidden;background:#0a0000;border-top:2px solid #ff2200;border-bottom:2px solid #ff2200;padding:6px 0;margin-bottom:12px}
.casino-marquee{display:inline-block;white-space:nowrap;animation:marquee 12s linear infinite;font-family:'Black Han Sans',sans-serif;font-size:.95rem;color:#ffd600;letter-spacing:2px}
.casino-neon-title{font-family:'Black Han Sans',sans-serif;font-size:2.4rem;color:#ffd600;animation:neonPulse 1.8s infinite;text-align:center;margin:8px 0 4px}
.casino-sub{font-size:.85rem;color:#ff8a80;text-align:center;letter-spacing:3px;margin-bottom:18px;animation:neonPulse 2.2s .4s infinite}
.casino-card{
  background:linear-gradient(160deg,#0a0000,#1a0000);
  border:2px solid #ffd600;border-radius:16px;padding:24px 28px;text-align:center;
  box-shadow:0 0 30px rgba(255,50,0,.4),0 0 60px rgba(255,150,0,.15),inset 0 0 30px rgba(0,0,0,.5);
  position:relative;overflow:hidden;
}
.casino-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);pointer-events:none}
.casino-card-icon{font-size:3rem;animation:floatChip 3s ease-in-out infinite;display:block;margin-bottom:8px}
.casino-card-title{font-family:'Black Han Sans',sans-serif;color:#ffd600;font-size:1.3rem;margin-bottom:4px;animation:neonPulse 2s infinite}
.casino-card-max{color:#ff8a80;font-size:.82rem;margin-bottom:16px;letter-spacing:1px}
.casino-enter-btn{
  background:linear-gradient(135deg,#b01208,#ff3a00);border:2px solid #ffd600;
  color:#ffd600;padding:12px 36px;border-radius:8px;cursor:pointer;
  font-weight:800;font-size:1rem;font-family:inherit;
  box-shadow:0 0 20px rgba(255,50,0,.6);
  animation:neonPulse 1.5s infinite;
  transition:transform .1s;
}
.casino-enter-btn:active{transform:scale(.96)}
.casino-banner{
  width:100%;max-width:460px;background:linear-gradient(90deg,#0a0000,#1a0000,#0a0000);
  border:1px solid #ff2200;border-radius:8px;padding:10px 16px;
  font-family:'Black Han Sans',sans-serif;font-size:.85rem;
  color:#ff8a80;text-align:center;letter-spacing:1px;
  box-shadow:0 0 12px rgba(255,30,0,.3);
  animation:neonPulse 2.5s infinite;
}

@keyframes podiumRise{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}
@keyframes medalDrop{0%{transform:translateY(-30px) scale(.5);opacity:0}60%{transform:translateY(4px) scale(1.15)}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes nameAppear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.podium-bar{transform-origin:bottom;animation:podiumRise .7s cubic-bezier(.22,.61,.36,1) both}
.podium-medal{animation:medalDrop .6s cubic-bezier(.22,.61,.36,1) both}
.podium-name{animation:nameAppear .5s ease both}
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingPage">
  <div style="font-family:'Black Han Sans',sans-serif;font-size:1.4rem;color:var(--gold-light)">🪙 2-1 학급 코인 상점</div>
  <div class="spinner"></div>
  <div style="color:var(--text-muted);font-size:.85rem">Firebase 연결 중...</div>
</div>

<div id="loginPage" class="login" style="display:none">
  <h2>🪙 2-1 학급 코인 상점</h2>
  <input id="loginId" placeholder="학생 번호 또는 관리자 ID">
  <input id="loginPw" type="password" placeholder="비밀번호">
  <div id="loginErr" class="err"></div>
  <button id="loginBtn">로그인</button>
  <p class="hint">처음이라면 <span id="goSignup">회원가입</span></p>
</div>

<div id="signupPage" class="login" style="display:none">
  <h2>✏️ 회원가입</h2>
  <input id="signupNum" placeholder="학생 번호 (1~35)">
  <input id="signupPw1" type="text" placeholder="비밀번호 (4자 이상)">
  <div id="pwHint" style="font-size:.78rem;width:85%;margin:-4px auto 8px;text-align:left;min-height:16px;color:#5a8a65"></div>
  <input id="signupPw2" type="password" placeholder="비밀번호 확인">
  <div id="signupErr" class="err"></div>
  <button id="signupBtn">가입 완료</button>
  <p class="hint">이미 있다면 <span id="goLogin">로그인으로</span></p>
</div>

<div id="mainPage" style="display:none">
  <header>
    <h1>🪙 2-1 학급 코인 상점</h1>
    <p>코인으로 원하는 보상을 구매하세요</p>
  </header>
  <div class="container">
    <div class="balance-bar">
      <span style="font-size:1.4rem">🪙</span>
      <span class="lbl">내 코인</span>
      <span class="amount" id="coins">0</span>
      <span class="lbl">코인</span>
      <span id="userName" style="margin-left:auto;font-size:1rem;font-weight:800;color:var(--text-muted)"></span>
    </div>
    <div class="top-actions">
      <button id="btnLog" class="btn-y">📋 결재 내역</button>
      <button id="btnCasino" style="background:linear-gradient(135deg,#b01208,#e8280b);box-shadow:0 3px 8px rgba(192,22,14,.5)">🎮 <span class="rainbow-text">미니게임</span></button>
      <button id="btnBig" style="background:linear-gradient(135deg,#7a5500,#d4a017);box-shadow:0 3px 8px rgba(212,160,23,.5)">💰 소비 순위</button>
      <button id="btnChat" style="background:linear-gradient(135deg,#1a4a6b,#2a7a4a);box-shadow:0 3px 8px rgba(42,122,74,.5)">💬 게시판</button>
      <button id="btnHowTo" style="background:linear-gradient(135deg,#0a4a6b,#1a8ab4);box-shadow:0 3px 8px rgba(26,138,180,.5)">📖 코인 얻는법</button>
      <button id="btnLogout" style="background:linear-gradient(135deg,#3a1a1a,#6a2a2a);box-shadow:0 3px 8px rgba(0,0,0,.4);margin-left:auto">🚪 로그아웃</button>
    </div>

<script type="module">

// ── Firebase 설정 ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyByQvi2x0ukSARLnrWV3fuJ1KrtQ6rlnhA",
  authDomain: "coinstore-f204e.firebaseapp.com",
  databaseURL: "https://coinstore-f204e-default-rtdb.asia-southeast1.firebasedatabase.app",

// ── 상수 ──────────────────────────────────────────────
const ADMIN_ID = '관리자', ADMIN_PW = '1qksrlwoqn';
const NAMES = ['곽선우','김대현','김민성','김민찬','김선규','김선율','김지호','김지후','김현우','박시후','박재준','박준교','박준서','박준호','손정우','손채운','신건','신윤송','오상준','유태민','이건우','이상헌','이상휘','이선준','이승준','이원찬','이지상','이지용','정찬영','정혁준','조민성','조현웅','주효찬','최유준','허준혁'];
const CLEAN_LIMIT = 3, SEAT_LIMIT = 3;

// ── 상태 ──────────────────────────────────────────────
let me = null;

// ── 유틸 ──────────────────────────────────────────────
const g = id => document.getElementById(id);

const si = () => parseInt(me) - 1;
const normKey = s => { const n = parseInt(s); return (n >= 1 && n <= 35) ? String(n) : null; };
const now = () => {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
};

// ── Firebase 읽기/쓰기 ─────────────────────────────────
async function fbGet(path) {
  const snap = await get(ref(db, path));
  return snap.exists() ? snap.val() : null;
}
async function fbSet(path, val) {
  await set(ref(db, path), val);
}
async function fbUpdate(path, val) {
  await update(ref(db, path), val);
}
async function fbPush(path, val) {
  await push(ref(db, path), val);
}

// ── 실시간 구독 ────────────────────────────────────────
function subscribeCoins() {
  if (unsubCoins) off(ref(db, 'coins'));
  onValue(ref(db, 'coins'), snap => {
    if (snap.exists()) {
      const data = snap.val();
      for (let i = 0; i < 35; i++) coins[i] = data[i] ?? 0;
    }
    if (me && !isAdmin()) g('coins').textContent = coins[si()];
    updateTable();
  });
}

// ── 청소/자리 제한 ─────────────────────────────────────
async function getCleanToday() {
  const today = new Date().toISOString().slice(0,10);
  const data = await fbGet('limits/clean');
  if (!data || data.date !== today) return [];
  return data.buyers || [];
}
async function saveCleanToday(buyers) {
  const today = new Date().toISOString().slice(0,10);
  await fbSet('limits/clean', {date: today, buyers});
}
async function getSeatMonth() {
  const month = new Date().toISOString().slice(0,7);
  const data = await fbGet('limits/seat');
  if (!data || data.month !== month) return [];
  return data.buyers || [];
}
async function saveSeatMonth(buyers) {
  const month = new Date().toISOString().slice(0,7);
  await fbSet('limits/seat', {month, buyers});
}
function getMonthRestockTime() {
  const now = new Date();
  const next = new Date(now.getFullYear(), now.getMonth()+1, 1);
  const diff = next - now;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  return `${d}일 ${h}시간 후 재입고`;
}
function getRestockTime() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const diff = midnight - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return `${h}시간 ${m}분 후 재입고`;
}
async function updateSeatStatus() {
  const el = g('seatStatus'); if (!el) return;
  const buyers = await getSeatMonth();
  const remaining = SEAT_LIMIT - buyers.length;
  const isBought = buyers.includes(me);
  const restock = `<div style="color:#888;font-size:.7rem;margin-top:3px">🕐 ${getMonthRestockTime()}</div>`;
  if (isBought) el.innerHTML = `<div>✅ 이번 달 구매 완료</div>${restock}`;
  else if (remaining <= 0) el.innerHTML = `<div>❌ 이번 달 마감 (${SEAT_LIMIT}/${SEAT_LIMIT}명)</div>${restock}`;
  else el.textContent = `⏳ 이번 달 남은 자리: ${remaining}/${SEAT_LIMIT}명`;
}
async function updateCleanStatus() {
  const el = g('cleanStatus'); if (!el) return;
  const buyers = await getCleanToday();
  const remaining = CLEAN_LIMIT - buyers.length;
  const isBought = buyers.includes(me);
  const restock = `<div style="color:#888;font-size:.7rem;margin-top:3px">🕐 ${getRestockTime()}</div>`;
  if (isBought) el.innerHTML = `<div>✅ 오늘 구매 완료</div>${restock}`;
  else if (remaining <= 0) el.innerHTML = `<div>❌ 오늘 마감 (${CLEAN_LIMIT}/${CLEAN_LIMIT}명)</div>${restock}`;
  else el.textContent = `⏳ 오늘 남은 자리: ${remaining}/${CLEAN_LIMIT}명`;
}

// ── 로그 ──────────────────────────────────────────────
async function addLog(delta, user, item) {
  const who = user === ADMIN_ID ? '관리자' : `${parseInt(user)}번 ${NAMES[parseInt(user)-1]}`;
  await fbPush('logs', { delta, student: who, item, time: now() });
}
async function loadLogs() {
  const data = await fbGet('logs');
  if (!data) { logs = []; return; }
  logs = Object.values(data);
}

// ── 페이지 전환 ────────────────────────────────────────
function showPage(id) {
  ['loginPage','signupPage','mainPage'].forEach(p => g(p).style.display = 'none');
  g(id).style.display = id === 'loginPage' || id === 'signupPage' ? 'block' : 'block';
}

// ── 앱 진입 ────────────────────────────────────────────
async function enterApp(user) {
  me = user;
  showPage('mainPage');
  g('adminPanel').style.display = isAdmin() ? 'flex' : 'none';
  g('userName').textContent = isAdmin() ? '관리자' : NAMES[si()];
  g('coins').textContent = isAdmin() ? '∞' : coins[si()];
  subscribeCoins();
  updateTable();
  await updateCleanStatus();
  await updateSeatStatus();
}

// ── 초기 데이터 로드 ───────────────────────────────────
async function initData() {
  g('loadingPage').style.display = 'flex';
  try {
    // 코인
    const coinData = await fbGet('coins');
    if (coinData) {
      for (let i = 0; i < 35; i++) coins[i] = coinData[i] ?? 0;
    } else {
      await fbSet('coins', Array(35).fill(0));
    }
    // 비밀번호
    const pwData = await fbGet('passwords');
    passwords = pwData || {};
  } catch(e) {
    console.error(e);
    alert('Firebase 연결 실패. 콘솔을 확인해주세요.');
  }
  g('loadingPage').style.display = 'none';
  showPage('loginPage');
}

// ── 인증 ──────────────────────────────────────────────
function checkPwLen() {
  const pw = g('signupPw1').value, h = g('pwHint');
  if (!pw) { h.textContent = ''; return; }
  h.style.color = pw.length < 4 ? '#ff7070' : '#4cdc78';
  h.textContent = pw.length < 4 ? `${pw.length}자 — 4자 이상 입력해 주세요` : `✓ ${pw.length}자`;
}
async function signup() {
  const key = normKey(g('signupNum').value.trim());
  const pw1 = g('signupPw1').value, pw2 = g('signupPw2').value, err = g('signupErr');
  if (!key)           { err.textContent = '학생 번호는 1~35 사이여야 해요.'; return; }
  if (passwords[key]) { err.textContent = '이미 가입된 번호예요! 로그인해 주세요.'; return; }
  if (pw1.length < 4) { err.textContent = '비밀번호는 4자 이상이어야 해요.'; return; }
  if (pw1 !== pw2)    { err.textContent = '비밀번호가 일치하지 않아요.'; return; }
  passwords[key] = pw1;
  await fbSet(`passwords/${key}`, pw1);
  err.style.color = '#f5c842'; err.textContent = '가입 완료! 로그인해 주세요 🎉';
  setTimeout(() => { err.style.color = '#ff7070'; showPage('loginPage'); }, 1200);
}
async function tryLogin() {
  const id = g('loginId').value.trim(), pw = g('loginPw').value, err = g('loginErr');
  if (!id || !pw) { err.textContent = '아이디와 비밀번호를 입력해 주세요.'; return; }
  if (id === ADMIN_ID) {
    if (pw !== ADMIN_PW) { err.textContent = '비밀번호가 틀렸어요.'; return; }
    await enterApp(ADMIN_ID); return;
  }
  const key = normKey(id);
  if (!key) { err.textContent = '올바른 학생 번호를 입력해 주세요.'; return; }
  // 최신 비밀번호 Firebase에서 확인
  const fbPw = await fbGet(`passwords/${key}`);
  if (!fbPw)       { err.textContent = '가입 내역이 없어요. 먼저 회원가입 해주세요.'; return; }
  if (fbPw !== pw) { err.textContent = '비밀번호가 틀렸어요.'; return; }
  passwords[key] = fbPw;
  await enterApp(key);
}
function logout() {
  me = null;
  if (unsubCoins) { off(ref(db, 'coins')); unsubCoins = null; }
  g('loginId').value = ''; g('loginPw').value = '';
  g('loginErr').textContent = '';
  showPage('loginPage');
}

// ── 관리자 ────────────────────────────────────────────
async function changeCoin() {
  const key = normKey(g('adminNum').value), amt = Number(g('adminAmt').value);
  const reason = g('adminReason').value.trim() || '관리자 수정';
  if (!key || isNaN(amt)) { alert('올바른 값을 입력하세요'); return; }
  const idx = parseInt(key)-1;
  coins[idx] += amt;
  await fbSet(`coins/${idx}`, coins[idx]);
  await addLog(amt, key, reason);
  g('adminReason').value = '';
  updateTable();
  alert(`${key}번 ${NAMES[idx]} 코인 변경 완료 ✅`);
}
async function askReset() {
  const key = normKey(g('resetNum').value);
  if (!key) { g('resetMsg').textContent = '올바른 학생 번호를 입력하세요'; return; }

}

}
function cancelReset() { g('resetConfirm').style.display = 'none'; }

// ── 상점 ──────────────────────────────────────────────
function buy(price, item) {
  if (isAdmin()) { alert('학생만 구매 가능해요'); return; }
  if (coins[si()] < price) { alert('코인이 부족해요 😢'); return; }
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:#152e1e;border:2px solid var(--gold);border-radius:16px;padding:32px 28px;text-align:center;max-width:300px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.8)">
      <div style="font-size:2rem;margin-bottom:12px">🛒</div>
      <div style="font-family:'Black Han Sans',sans-serif;color:var(--gold-light);font-size:1.1rem;margin-bottom:8px">${item}</div>
      <div style="color:var(--text-muted);font-size:.9rem;margin-bottom:24px">${price}코인을 사용합니다.<br>정말 구매하시겠습니까?</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button id="modalCancel" style="flex:1;padding:10px;background:#1a3a20;border:1px solid var(--surface2);color:var(--text-muted);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:800">취소</button>
        <button id="modalConfirm" style="flex:1;padding:10px;background:linear-gradient(135deg,var(--green-dark),var(--green));border:1px solid var(--gold);color:var(--gold-light);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:800">구매</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#modalCancel').onclick  = () => document.body.removeChild(modal);
  modal.querySelector('#modalConfirm').onclick = () => { document.body.removeChild(modal); buyExec(price, item); };
}
async function buyExec(price, item) {
  if (isAdmin()) { alert('학생만 구매 가능해요'); return; }
  if (coins[si()] < price) { alert('코인이 부족해요 😢'); return; }

  if (item === '자리 변경 우선권') {
    const buyers = await getSeatMonth();
    if (buyers.includes(me)) { alert('이번 달 이미 자리 변경 우선권을 구매했어요!'); return; }
    if (buyers.length >= SEAT_LIMIT) { alert(`이번 달 자리 변경 우선권은 마감됐어요!`); return; }
    await saveSeatMonth([...buyers, me]);
  }
  if (item === '청소 면제') {
    const buyers = await getCleanToday();
    if (buyers.includes(me)) { alert('오늘 이미 청소 면제를 구매했어요!'); return; }
    if (buyers.length >= CLEAN_LIMIT) { alert(`오늘 청소 면제는 마감됐어요!`); return; }
    await saveCleanToday([...buyers, me]);
  }
  const idx = si();
  coins[idx] -= price;
  await fbSet(`coins/${idx}`, coins[idx]);
  await addLog(-price, me, item);
  alert(`${item} 구매 완료 ✅`);
  g('coins').textContent = coins[idx];
  updateTable();
  await updateCleanStatus();
  await updateSeatStatus();
}

// ── 테이블 ────────────────────────────────────────────
function setSortOrder(order) {
  sortOrder = order;
  g('sortByNum').className  = order === 'num'  ? 'btn-y' : '';
  g('sortByCoin').className = order === 'coin' ? 'btn-y' : '';
  updateTable();
}
function updateTable() {
  let rows = coins.map((c, i) => ({ num: i+1, name: NAMES[i], coin: c }));
  if (sortOrder === 'coin') rows.sort((a, b) => b.coin - a.coin);
  g('coinTable').innerHTML = rows.map(r => `<tr><td>${r.num}번</td><td>${r.name}</td><td>${r.coin}</td></tr>`).join('');
}

// ── 결재 내역 ─────────────────────────────────────────
function renderLogs(list) {
  if (!list.length) return '<div style="text-align:center;color:var(--text-muted);padding:60px">내역이 없습니다 🪙</div>';
  return [...list].reverse().map((e, i) => {
    const p = e.delta >= 0;
    return `<div class="log-card ${p?'plus':''}" style="animation-delay:${i*.03}s">
      <div class="log-amt ${p?'plus':'minus'}">${p?'+':''}${e.delta}</div>
      <div class="log-time">${e.time}</div>
      <div class="log-who">${e.student}</div>
      <div class="log-item">${e.item}</div>
    </div>`;
  }).join('');
}
async function goToLogPage() {
  await loadLogs();
  const myName = isAdmin() ? null : `${parseInt(me)}번 ${NAMES[si()]}`;
  const filtered = isAdmin() ? logs : logs.filter(e => e.student === myName);
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="ov-header">
      <button class="btn-y" id="logBack">← 뒤로가기</button>
      <h2>📋 ${isAdmin() ? '전체 결재 내역' : '내 결재 내역'}</h2>
    </div>
    ${isAdmin() ? `
    <div style="max-width:1100px;margin:0 auto 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="logSearch" placeholder="번호 또는 이름 검색"
        style="flex:1;min-width:200px;max-width:360px;padding:10px 14px;background:var(--surface2);border:1px solid var(--green-mid);color:var(--text);border-radius:8px;font-family:inherit;font-size:.9rem;outline:none">
      <button id="logSearchBtn" class="btn-y" style="font-size:.85rem;padding:9px 16px">🔍 검색</button>
      <button id="logResetBtn" style="font-size:.85rem;padding:9px 16px">전체 보기</button>
    </div>` : ''}
    <div class="log-cards" id="logCards">${renderLogs(filtered)}</div>`;
  document.body.appendChild(ov);
  ov.querySelector('#logBack').onclick = () => document.body.removeChild(ov);
  if (isAdmin()) {
    const inp = ov.querySelector('#logSearch');
    const doSearch = () => {
      const q = inp.value.trim().toLowerCase();
      ov.querySelector('#logCards').innerHTML = renderLogs(q ? logs.filter(e => e.student.toLowerCase().includes(q)) : logs);

// ── 룰렛 ──────────────────────────────────────────────
const WHEEL_NUMS = (() => {
  const base = [
    {n:32,c:'red'},{n:15,c:'black'},{n:19,c:'red'},{n:4,c:'black'},
    {n:21,c:'red'},{n:2,c:'black'},{n:25,c:'red'},{n:17,c:'black'},
    {n:34,c:'red'},{n:6,c:'black'},{n:27,c:'red'},{n:13,c:'black'},
    {n:36,c:'red'},{n:11,c:'black'},{n:30,c:'red'},{n:8,c:'black'},
    {n:23,c:'red'},{n:10,c:'black'},{n:5,c:'red'},{n:24,c:'black'},
    {n:16,c:'red'},{n:33,c:'black'},{n:1,c:'red'},{n:20,c:'black'},
    {n:14,c:'red'},{n:31,c:'black'},{n:9,c:'red'},{n:22,c:'black'},
    {n:18,c:'red'},{n:29,c:'black'},{n:7,c:'red'},{n:28,c:'black'},
    {n:12,c:'red'},{n:35,c:'black'},{n:3,c:'red'},{n:26,c:'black'}
  ];
  const flipped = base.map(s => ({n:s.n, c: s.c==='red'?'black':'red'}));
  return [...base, {n:0,c:'green'}, ...flipped];
})();
function getRange(n) { if (n<=12) return 1; if (n<=24) return 2; return 3; }
function drawWheel(canvas, angle) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, cx = W/2, cy = W/2, R = W/2-4;
  const n = WHEEL_NUMS.length, sliceAngle = 2*Math.PI/n;
  ctx.clearRect(0, 0, W, W);
  const woodGrad = ctx.createRadialGradient(cx,cy,R*0.82,cx,cy,R);
  woodGrad.addColorStop(0,'#8B4513'); woodGrad.addColorStop(0.4,'#A0522D'); woodGrad.addColorStop(1,'#5C2E00');
  ctx.beginPath(); ctx.arc(cx,cy,R,0,2*Math.PI); ctx.fillStyle=woodGrad; ctx.fill();
  for (let i = 0; i < n; i++) {
    const {n: num, c} = WHEEL_NUMS[i];
    const a = angle + i*sliceAngle;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R*0.82,a,a+sliceAngle); ctx.closePath();
    ctx.fillStyle = c==='red' ? '#c0160e' : c==='green' ? '#1a7a3a' : '#111'; ctx.fill();
    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(a+sliceAngle/2);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='white'; ctx.font=`bold ${R*0.075}px Arial`;
    ctx.fillText(num, R*0.66, 0); ctx.restore();
  }
  const goldGrad = ctx.createRadialGradient(cx-8,cy-8,2,cx,cy,R*0.42);
  goldGrad.addColorStop(0,'#ffe066'); goldGrad.addColorStop(0.5,'#c8960c'); goldGrad.addColorStop(1,'#7a5500');
  ctx.beginPath(); ctx.arc(cx,cy,R*0.42,0,2*Math.PI); ctx.fillStyle=goldGrad; ctx.fill();
  ctx.strokeStyle='#ffd600'; ctx.lineWidth=3; ctx.stroke();
  const bossGrad = ctx.createRadialGradient(cx-4,cy-4,2,cx,cy,R*0.14);
  bossGrad.addColorStop(0,'#ffe066'); bossGrad.addColorStop(0.6,'#b8860b'); bossGrad.addColorStop(1,'#5a3e00');
  ctx.beginPath(); ctx.arc(cx,cy,R*0.13,0,2*Math.PI); ctx.fillStyle=bossGrad; ctx.fill();
  ctx.strokeStyle='#ffd600'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,2*Math.PI); ctx.strokeStyle='#ffd600'; ctx.lineWidth=4; ctx.stroke();
}
function drawBall(ballCanvas, ballAngle, ballR) {
  const ctx = ballCanvas.getContext('2d');
  const W = ballCanvas.width, cx = W/2, cy = W/2, R = W/2-4;
  ctx.clearRect(0, 0, W, W);
  const bx = cx + ballR*Math.cos(ballAngle), by = cy + ballR*Math.sin(ballAngle);
  const size = R*0.032;
  ctx.beginPath(); ctx.arc(bx+2,by+2,size,0,2*Math.PI); ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fill();
  const bGrad = ctx.createRadialGradient(bx-2,by-2,1,bx,by,size);
  bGrad.addColorStop(0,'#ffffff'); bGrad.addColorStop(0.3,'#e0e0e0'); bGrad.addColorStop(1,'#888');
  ctx.beginPath(); ctx.arc(bx,by,size,0,2*Math.PI); ctx.fillStyle=bGrad; ctx.fill();
}
function spinRoulette(ov, onDone) {
  const wCv = ov.querySelector('#rCanvas'), bCv = ov.querySelector('#rBallCanvas');
  const W = wCv.width, R = W/2-4, n = WHEEL_NUMS.length, sliceAngle = 2*Math.PI/n;
  const duration = 5000;
  let startTime = null;
  const wheelFinalAngle = 2*Math.PI * (5 + Math.random()*3);
  const ballFinalAngle  = -Math.PI/2 - 2*Math.PI * (7 + Math.random()*4);
  function easeOut(t) { return 1 - Math.pow(1-t, 4); }
  function frame(ts) {
    if (!startTime) startTime = ts;
    const t = Math.min((ts-startTime)/duration, 1), te = easeOut(t);
    const wAngle = wheelFinalAngle * te;
    const dropT  = Math.max(0, (t-0.5)/0.5);
    const bR     = R * (0.88 - dropT*dropT*0.26);
    const bAngle = -Math.PI/2 + (ballFinalAngle + Math.PI/2) * te;
    drawWheel(wCv, wAngle);
    drawBall(bCv, bAngle, bR);
    if (t < 1) { requestAnimationFrame(frame); return; }
    const absB = ((ballFinalAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    const absW = ((wheelFinalAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    const rel  = ((absB - absW) + 2*Math.PI) % (2*Math.PI);
    const idx  = Math.floor(rel / sliceAngle) % n;
    const {n: landedNum, c: landedColor} = WHEEL_NUMS[idx];
    drawWheel(wCv, wheelFinalAngle);
    drawBall(bCv, ballFinalAngle, R*0.62);
    setTimeout(() => onDone(landedNum, landedColor), 400);
  }
  requestAnimationFrame(frame);
}
